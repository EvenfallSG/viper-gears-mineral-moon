<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viper Gears — Mineral Moon Processor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Montserrat:wght@400;500;600&display=swap');

  :root {
    --bg: #0a0a0a;
    --panel: #141414;
    --panel-2: #1c1c1c;
    --border: #2a2a2a;
    --text: #ededed;
    --text-dim: #8a8a8a;
    --accent: #FF6B35;
    --accent-dim: #b34c26;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    min-height: 100vh;
  }

  header {
    padding: 2rem 2rem 1rem;
    border-bottom: 1px solid var(--border);
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 0.04em;
    margin: 0;
    color: var(--text);
  }

  h1 span { color: var(--accent); }
